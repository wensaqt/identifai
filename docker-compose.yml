services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]

  dataset:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./dataset/output:/app/dataset/output
    entrypoint: ["python", "-m", "dataset.generate"]
    profiles: ["dataset"]
